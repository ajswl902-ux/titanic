<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타이타닉 최종 통합 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #0f172a; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .waterline { animation: wave 3s ease-in-out infinite; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-8">
        <!-- 상단: 인터랙티브 분석 대시보드 -->
        <div class="glass-card p-8 rounded-3xl shadow-2xl">
            <h1 class="text-3xl font-black text-slate-900 text-center mb-2">타이타닉 생존자 분석 대시보드</h1>
            <div class="waterline text-center text-blue-500 mb-6">~~~~~~ 🌊 ~~~~~~</div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                    <h2 class="font-bold text-slate-700 mb-4">성별 생존 비율</h2>
                    <canvas id="survivalChart"></canvas>
                </div>
                <div class="space-y-4">
                    <div class="p-6 bg-amber-50 border border-amber-200 rounded-2xl">
                        <h3 class="font-bold text-amber-900">생존 핵심 통계</h3>
                        <p class="text-sm text-amber-800 leading-relaxed">여성 승객은 남성보다 압도적으로 높은 생존 확률을 보였으며, 이는 당시 구조 정책의 핵심 요인이었습니다.</p>
                    </div>
                    <div class="p-6 bg-blue-50 border border-blue-200 rounded-2xl">
                        <h3 class="font-bold text-blue-900">계급과 운명</h3>
                        <p class="text-sm text-blue-800 leading-relaxed">1등석 승객은 3등석 승객에 비해 구조 우선순위가 높았으며, 이는 생존율 통계에서 뚜렷하게 나타납니다.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 하단: 개인별 운명 예측 -->
        <div class="glass-card p-8 rounded-3xl shadow-2xl border border-blue-200">
            <h2 class="text-2xl font-bold text-slate-900 mb-6 text-center">개인별 운명 예측기</h2>
            <form id="predictionForm" class="space-y-4 no-print">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <select id="sex" class="p-4 bg-slate-50 border rounded-2xl">
                        <option value="1">남성</option>
                        <option value="0">여성</option>
                    </select>
                    <select id="pclass" class="p-4 bg-slate-50 border rounded-2xl">
                        <option value="1">1등석</option>
                        <option value="2">2등석</option>
                        <option value="3">3등석</option>
                    </select>
                    <input type="number" id="age" value="25" class="p-4 bg-slate-50 border rounded-2xl" placeholder="나이">
                </div>
                <button type="button" onclick="predict()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold hover:bg-slate-800 transition">예측 실행</button>
            </form>

            <div id="result" class="mt-6 p-4 rounded-2xl hidden text-center font-bold text-lg"></div>
            <div id="geminiSection" class="mt-6 hidden">
                <button type="button" onclick="generateStory()" class="w-full bg-amber-600 text-white p-4 rounded-2xl font-bold hover:bg-amber-700 transition">✨ Gemini가 들려주는 당시의 순간</button>
                <div id="storyResult" class="mt-4 p-6 bg-slate-100 rounded-2xl text-sm italic text-slate-700 leading-relaxed"></div>
                <button type="button" onclick="window.print()" class="w-full mt-4 bg-blue-600 text-white p-4 rounded-2xl font-bold no-print hover:bg-blue-700">📄 보고서 PDF 다운로드</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 

        function initializeChart() {
            const ctx = document.getElementById('survivalChart').getContext('2d');
            new Chart(ctx, {
                type: 'pie',
                data: { labels: ['여성 생존', '남성 생존'], datasets: [{ data: [74, 26], backgroundColor: ['#10b981', '#3b82f6'] }] }
            });
        }

        function predict() {
            const sex = parseInt(document.getElementById('sex').value);
            const pclass = parseInt(document.getElementById('pclass').value);
            const age = parseInt(document.getElementById('age').value);
            let survived = (sex === 0) ? (pclass !== 3 || age <= 30) : (pclass === 1 && age < 40);

            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('hidden');
            resultDiv.textContent = survived ? "생존 가능성이 매우 높습니다." : "생존 가능성이 낮습니다.";
            resultDiv.className = `mt-6 p-4 rounded-2xl text-center font-bold ${survived ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}`;
            document.getElementById('geminiSection').classList.remove('hidden');
        }

        async function generateStory() {
            const storyDiv = document.getElementById('storyResult');
            storyDiv.textContent = "📜 기록을 검색하는 중...";
            const sex = document.getElementById('sex').options[document.getElementById('sex').selectedIndex].text;
            const pclass = document.getElementById('pclass').options[document.getElementById('pclass').selectedIndex].text;
            const age = document.getElementById('age').value;
            const resultText = document.getElementById('result').textContent;
            
            const prompt = `타이타닉호 승객 정보: 성별 ${sex}, ${pclass}, ${age}세. 결과: ${resultText}. 당시 상황을 몰입감 있는 1인칭 소설로 짧게 써줘.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                storyDiv.textContent = data.candidates[0].content.parts[0].text;
            } catch (e) { storyDiv.textContent = "오류 발생."; }
        }

        window.onload = initializeChart;
    </script>
</body>
</html>
